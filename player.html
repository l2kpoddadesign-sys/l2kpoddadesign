<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Player</title>

<style>
  body{margin:0;background:black;color:white;font-family:Arial;}

  .top{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.8);
  }

  .logo span{color:red;}

  .back{
    background:red;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:8px;
    cursor:pointer;
  }

  .container{
    height:100vh;
  }

  iframe{
    width:100%;
    height:100vh;
    border:none;
  }

  .info{
    position:absolute;
    bottom:80px;
    left:40px;
    max-width:500px;
  }

  .info h1{font-size:40px;}
  .info p{color:#ccc;}
</style>
</head>

<body>

<div class="top">
  <div class="logo"><span>NET</span>FLIX STYLE</div>
  <button class="back" onclick="history.back()">⬅ Back</button>
</div>

<div class="container">

  <iframe id="video"></iframe>

  <div class="info">
    <h1 id="title">Loading...</h1>
    <p id="desc"></p>
  </div>

</div>

<script>

const API_KEY = "beefd3fc9f9d0a7487889bd54fde9a95";
const BASE = "https://api.themoviedb.org/3";

const id = new URLSearchParams(window.location.search).get("id");

async function loadMovie(){

  const res = await fetch(`${BASE}/movie/${id}?api_key=${API_KEY}`);
  const movie = await res.json();

  document.getElementById("title").innerText = movie.title;
  document.getElementById("desc").innerText = movie.overview;

  const vres = await fetch(`${BASE}/movie/${id}/videos?api_key=${API_KEY}`);
  const data = await vres.json();

  const trailer = data.results.find(v => v.type === "Trailer");

  if(trailer){
    document.getElementById("video").src =
      `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
  }

}

loadMovie();

</script>

</body>
</html>

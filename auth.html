<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - L2K CREATIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0f1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .auth-box {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .auth-box h1 {
            font-family: 'Orbitron', sans-serif;
            color: #3B82F6;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-box p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        
        .auth-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #0a0f1a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
        }
        
        .auth-box input:focus {
            outline: none;
            border-color: #3B82F6;
        }
        
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #3B82F6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 0.8rem;
            font-size: 1rem;
        }
        
        .auth-btn:hover { background: #2563eb; }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-switch {
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .auth-switch span { color: #3B82F6; font-weight: 600; }
        
        .auth-error, .auth-success {
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            padding: 0.8rem;
            border-radius: 8px;
        }
        
        .auth-error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .auth-success {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>L2K CREATIONS</h1>
        <p id="authDesc">Create an account to use Free Logo Generator</p>
        
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>
        
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" minlength="6" required>
        
        <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Register</button>
        
        <div class="auth-switch" onclick="toggleAuthMode()">
            <span id="switchText">Already have an account? <span>Login here</span></span>
        </div>
        
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://evckawkvykaiyoftshce.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_lpnhuXbl7DDzowF9B_g16w_d14OlJD3';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let isLoginMode = false;
        
        window.onload = async () => {
            const { data: { user } = await supabase.auth.getUser();
            if (user) {
                window.location.href = 'index.html';
            }
        };
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authDesc').textContent = isLoginMode 
                ? 'Login to your account' 
                : 'Create an account to use Free Logo Generator';
            document.getElementById('authSubmitBtn').textContent = isLoginMode ? 'Login' : 'Register';
            document.getElementById('switchText').innerHTML = isLoginMode 
                ? `Don't have an account? <span>Register here</span>`
                : `Already have an account? <span>Login here</span>`;
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
        }
        
        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');
            const successDiv = document.getElementById('authSuccess');
            const btn = document.getElementById('authSubmitBtn');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please fill all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Loading...';
            
            try {
                let result = isLoginMode 
                    ? await supabase.auth.signInWithPassword({ email, password })
                    : await supabase.auth.signUp({ email, password });
                
                if (result.error) {
                    errorDiv.textContent = result.error.message;
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = isLoginMode ? 'Login' : 'Register';
                    return;
                }
                
                if (isLoginMode || result.data.session) {
                    window.location.href = 'index.html';
                } else {
                    successDiv.textContent = 'Registration successful! You can now login.';
                    successDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Register';
                }
                
            } catch (err) {
                errorDiv.textContent = 'Something went wrong. Try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = isLoginMode ? 'Login' : 'Register';
            }
        }
    </script>
</body>
</html>

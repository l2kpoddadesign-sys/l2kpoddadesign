<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INFINITY CINEMA</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
  }

  body{
    background:#000;
    color:white;
  }

  /* NAVBAR */
  nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    z-index:10;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  }

  .logo{
    font-size:28px;
    font-weight:bold;
  }

  .logo span{
    color:red;
  }

  .search{
    padding:10px 15px;
    border-radius:20px;
    border:none;
    background:#111;
    color:white;
  }

  /* HERO BANNER */
  .hero{
    height:90vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:60px;
    position:relative;
  }

  .hero::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to top, black, transparent);
  }

  .hero-content{
    position:relative;
    z-index:2;
    max-width:600px;
  }

  .hero-content h1{
    font-size:60px;
  }

  .hero-content p{
    color:#ccc;
    margin:15px 0;
  }

  .btn{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
  }

  .play{
    background:white;
    color:black;
  }

  .list{
    background:#222;
    color:white;
    margin-left:10px;
  }

  /* ROWS */
  .row{
    padding:20px 40px;
  }

  .row h2{
    margin-bottom:15px;
  }

  .movies{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding-bottom:10px;
  }

  .movies::-webkit-scrollbar{
    display:none;
  }

  .card{
    min-width:160px;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
  }

  .card:hover{
    transform:scale(1.05);
  }

  .card img{
    width:100%;
    height:240px;
    object-fit:cover;
  }

  .card h4{
    font-size:14px;
    padding:10px;
  }

</style>

</head>

<body>

<nav>
  <div class="logo"><span>INFINITY</span> CINEMA</div>
  <input class="search" id="searchInput" placeholder="Search movies...">
</nav>

<!-- HERO -->
<div class="hero" id="hero">

  <div class="hero-content">
    <h1 id="heroTitle">Loading...</h1>
    <p id="heroDesc"></p>

    <button class="btn play" id="heroBtn">▶ Watch</button>
    <button class="btn list">+ My List</button>
  </div>

</div>

<!-- TRENDING ROW -->
<div class="row">
  <h2>🔥 Trending</h2>
  <div class="movies" id="trending"></div>
</div>

<!-- POPULAR ROW -->
<div class="row">
  <h2>🎬 Popular Movies</h2>
  <div class="movies" id="popular"></div>
</div>

<script>

const API = "beefd3fc9f9d0a7487889bd54fde9a95";
const BASE = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/original";

const trending = document.getElementById("trending");
const popular = document.getElementById("popular");
const hero = document.getElementById("hero");

let currentMovieId = null;

/* LOAD TRENDING */
async function loadTrending(){

  const res = await fetch(`${BASE}/trending/movie/week?api_key=${API}`);
  const data = await res.json();

  setHero(data.results[0]);
  renderRow(data.results, trending);
}

/* LOAD POPULAR */
async function loadPopular(){

  const res = await fetch(`${BASE}/movie/popular?api_key=${API}`);
  const data = await res.json();

  renderRow(data.results, popular);
}

/* HERO SECTION */
function setHero(movie){

  currentMovieId = movie.id;

  hero.style.backgroundImage =
    `url(${IMG + movie.backdrop_path})`;

  document.getElementById("heroTitle").innerText = movie.title;
  document.getElementById("heroDesc").innerText = movie.overview;

}

/* ROW CARDS */
function renderRow(movies, container){

  container.innerHTML = "";

  movies.forEach(movie => {

    container.innerHTML += `
      <div class="card" onclick="openMovie(${movie.id})">
        <img src="${IMG + movie.poster_path}">
        <h4>${movie.title}</h4>
      </div>
    `;

  });

}

/* OPEN PLAYER */
function openMovie(id){
  window.location.href = "player.html?id=" + id;
}

/* HERO BUTTON */
document.getElementById("heroBtn").onclick = () => {
  openMovie(currentMovieId);
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("keyup", async (e)=>{

  const value = e.target.value;

  if(value.length < 1){
    loadTrending();
    loadPopular();
    return;
  }

  const res = await fetch(`${BASE}/search/movie?api_key=${API}&query=${value}`);
  const data = await res.json();

  renderRow(data.results, trending);

});

loadTrending();
loadPopular();

</script>

</body>
</html>

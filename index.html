<!DOCTYPE html>
<html>
<head>
  <title>NEXT LEVEL MOVIE</title>

  <style>
    body {
      margin: 0;
      background: #141414;
      color: white;
      font-family: Arial;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: black;
      position: sticky;
      top: 0;
    }

    .logo {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      height: 400px;
      background: url('/thumbnails/default.jpg') center/cover;
      display: flex;
      align-items: center;
      padding-left: 50px;
    }

    .hero h1 {
      font-size: 50px;
    }

    /* MOVIE ROW */
    .row {
      margin: 20px;
    }

    .row h2 {
      margin-left: 10px;
    }

    .movies {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
    }

    .card {
      min-width: 200px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card:hover {
      transform: scale(1.1);
    }

    /* PLAYER MODAL */
    .player-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">NEXT LEVEL MOVIE</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Unlimited Movies 🎬</h1>
</div>

<!-- MOVIES -->
<div class="row">
  <h2>Popular</h2>
  <div class="movies" id="movieList"></div>
</div>

<!-- PLAYER -->
<div class="player-box" id="playerBox">
  <span class="close" onclick="closePlayer()">✖</span>
  <video id="player" controls></video>
</div>

<script>
const list = document.getElementById("movieList");
const player = document.getElementById("player");
const box = document.getElementById("playerBox");

fetch("/movies")
.then(res => res.json())
.then(data => {
  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="/thumbnails/${m.thumb}">
    `;

    div.onclick = () => {
      player.src = "/uploads/" + m.video;
      box.style.display = "flex";
      player.play();
    };

    list.appendChild(div);
  });
});

function closePlayer() {
  box.style.display = "none";
  player.pause();
}
</script>

</body>
</html>

<script>
// Logo typing effect
var text="Creative | Professional | Trusted Graphics Design";
var i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}}
typing();

// Popup function
function showDesign(image){
alert("මේ වගේ ACCOUNT SELL POST එකක් ඔයාටත් හදාගන්න ඔනින් දැම්ම මැසේජ් එකක් දාන්න L2K & PODDA DESIGN 🤍😗");
document.getElementById("popup-img").src=image;
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

// SNOW EFFECT - Soft glowing + natural sway
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});

const numFlakes = 150;
const flakes = [];

for(let i = 0; i < numFlakes; i++){
  flakes.push({
    x: Math.random() * width,
    y: Math.random() * height,
    r: Math.random() * 5 + 1,
    d: Math.random() * numFlakes,
    speed: Math.random() * 1 + 0.5,
    opacity: Math.random() * 0.5 + 0.3,
    sway: Math.random() * 2 + 1,
    swayAngle: Math.random() * Math.PI * 2
  });
}

function drawSnow(){
  ctx.clearRect(0,0,width,height);
  for(let i = 0; i < numFlakes; i++){
    let f = flakes[i];
    let gradient = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
    gradient.addColorStop(0, `rgba(255,255,255,${f.opacity})`);
    gradient.addColorStop(0.5, `rgba(255,255,255,${f.opacity/2})`);
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
    ctx.fill();
  }
  moveSnow();
}

let angle = 0;

function moveSnow(){
  angle += 0.01;
  for(let i = 0; i < numFlakes; i++){
    let f = flakes[i];
    f.y += Math.cos(angle + f.d) + 1 + f.speed;
    f.x += Math.sin(f.swayAngle + angle) * f.sway;
    f.swayAngle += 0.01;

    if(f.x > width + 5 || f.x < -5 || f.y > height){
      flakes[i] = {
        x: Math.random()*width,
        y: -10,
        r: f.r,
        d: f.d,
        speed: f.speed,
        opacity: f.opacity,
        sway: f.sway,
        swayAngle: Math.random() * Math.PI * 2
      };
    }
  }
}

setInterval(drawSnow, 33);

// FLAME EFFECT - Flicker + Smoke
const canvasFlame = document.getElementById('flame');
const ctxFlame = canvasFlame.getContext('2d');
canvasFlame.width = 200;
canvasFlame.height = 200;

let particles = [];
let smoke = [];

function createParticle(){
  particles.push({
    x: canvasFlame.width/2 + (Math.random()*20-10),
    y: canvasFlame.height,
    r: Math.random() * 6 + 4,
    dx: Math.random() * 1 - 0.5,
    dy: Math.random() * -2 - 1,
    alpha: 1
  });
}

function createSmoke(){
  smoke.push({
    x: canvasFlame.width/2 + (Math.random()*40-20),
    y: canvasFlame.height,
    r: Math.random()*8 + 4,
    dx: Math.random()*0.5-0.25,
    dy: Math.random()*-1-0.5,
    alpha: Math.random()*0.3+0.2
  });
}

function drawFlame(){
  ctxFlame.clearRect(0,0,canvasFlame.width,canvasFlame.height);
  
  for(let i = 0; i < particles.length; i++){
    let p = particles[i];
    ctxFlame.beginPath();
    let gradient = ctxFlame.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
    gradient.addColorStop(0, `rgba(255,255,200,${p.alpha})`);
    gradient.addColorStop(0.5, `rgba(255,100,0,${p.alpha*0.6})`);
    gradient.addColorStop(1, `rgba(255,0,0,0)`);
    ctxFlame.fillStyle = gradient;
    ctxFlame.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctxFlame.fill();

    p.x += p.dx + Math.sin(Date.now()/200 + i)*0.5;
    p.y += p.dy;
    p.r *= 0.96;
    p.alpha *= 0.96;
    if(p.alpha < 0.05) particles.splice(i,1);
  }

  for(let i = 0; i < smoke.length; i++){
    let s = smoke[i];
    ctxFlame.beginPath();
    let gradient = ctxFlame.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    gradient.addColorStop(0, `rgba(200,200,200,${s.alpha})`);
    gradient.addColorStop(1, 'rgba(200,200,200,0)');
    ctxFlame.fillStyle = gradient;
    ctxFlame.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctxFlame.fill();

    s.x += s.dx + Math.sin(Date.now()/500 + i)*0.3;
    s.y += s.dy;
    s.r *= 0.99;
    s.alpha *= 0.97;
    if(s.alpha < 0.02) smoke.splice(i,1);
  }
}

function animateFlame(){
  createParticle();
  if(Math.random() < 0.4) createSmoke();
  drawFlame();
  requestAnimationFrame(animateFlame);
}

animateFlame();
</script>

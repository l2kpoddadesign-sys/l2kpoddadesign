<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY CINEMA</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#000;
  color:white;
}

/* NAVBAR */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  z-index:100;
}

.logo{
  font-size:30px;
  font-weight:bold;
}

.logo span{
  color:red;
}

.search{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  width:220px;
}

/* HERO */

.hero{
  height:90vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:60px;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, black, transparent);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.hero-content h1{
  font-size:60px;
}

.hero-content p{
  margin:20px 0;
  color:#ddd;
}

.btn{
  padding:12px 22px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.play{
  background:white;
  color:black;
}

.list{
  background:#222;
  color:white;
  margin-left:10px;
}

/* ROWS */

.row{
  padding:20px 40px;
}

.row h2{
  margin-bottom:15px;
}

.movies{
  display:flex;
  overflow-x:auto;
  gap:15px;
}

.movies::-webkit-scrollbar{
  display:none;
}

.card{
  min-width:180px;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card h4{
  padding:10px;
  font-size:15px;
}

@media(max-width:768px){

  .hero-content h1{
    font-size:40px;
  }

  nav{
    padding:15px;
  }

  .search{
    width:140px;
  }

}

</style>
</head>

<body>

<!-- NAV -->

<nav>

  <div class="logo">
    <span>INFINITY</span> CINEMA
  </div>

  <input 
    type="text"
    class="search"
    id="searchInput"
    placeholder="Search movies..."
  >

</nav>

<!-- HERO -->

<div class="hero" id="hero">

  <div class="hero-content">

    <h1 id="heroTitle">Loading...</h1>

    <p id="heroDesc"></p>

    <button class="btn play" id="heroBtn">
      ▶ Watch Movie
    </button>

    <button class="btn list">
      + My List
    </button>

  </div>

</div>

<!-- TRENDING -->

<div class="row">

  <h2>🔥 Trending Movies</h2>

  <div class="movies" id="trending"></div>

</div>

<!-- POPULAR -->

<div class="row">

  <h2>🎬 Popular Movies</h2>

  <div class="movies" id="popular"></div>

</div>

<script>

/* ========================= */
/* TMDB */
/* ========================= */

const API_KEY = "beefd3fc9f9d0a7487889bd54fde9a95";

const BASE_URL = "https://api.themoviedb.org/3";

const IMG = "https://image.tmdb.org/t/p/original";

/* ========================= */
/* YOUR FIREBASE MOVIE LINKS */
/* ========================= */

const movieVideos = {

  // TMDB movie ID : Firebase video link

  603: "https://www.w3schools.com/html/mov_bbb.mp4",

  550: "https://www.w3schools.com/html/movie.mp4",

  155: "https://www.w3schools.com/html/mov_bbb.mp4"

};

/* ========================= */

const trending = document.getElementById("trending");

const popular = document.getElementById("popular");

const hero = document.getElementById("hero");

let currentMovie = null;

/* ========================= */
/* LOAD TRENDING */
/* ========================= */

async function loadTrending(){

  const res = await fetch(
    `${BASE_URL}/trending/movie/week?api_key=${API_KEY}`
  );

  const data = await res.json();

  setHero(data.results[0]);

  renderMovies(data.results, trending);

}

/* ========================= */
/* LOAD POPULAR */
/* ========================= */

async function loadPopular(){

  const res = await fetch(
    `${BASE_URL}/movie/popular?api_key=${API_KEY}`
  );

  const data = await res.json();

  renderMovies(data.results, popular);

}

/* ========================= */
/* HERO */
/* ========================= */

function setHero(movie){

  currentMovie = movie;

  hero.style.backgroundImage =
    `url(${IMG + movie.backdrop_path})`;

  document.getElementById("heroTitle").innerText =
    movie.title;

  document.getElementById("heroDesc").innerText =
    movie.overview;

}

/* ========================= */
/* RENDER MOVIES */
/* ========================= */

function renderMovies(movies, container){

  container.innerHTML = "";

  movies.forEach(movie => {

    container.innerHTML += `

      <div class="card"
        onclick="openMovie(${movie.id})">

        <img src="${IMG + movie.poster_path}">

        <h4>${movie.title}</h4>

      </div>

    `;

  });

}

/* ========================= */
/* OPEN PLAYER */
/* ========================= */

function openMovie(id){

  const video = movieVideos[id];

  if(video){

    window.location.href =
      `player.html?id=${id}&video=${encodeURIComponent(video)}`;

  } else {

    alert("No full movie uploaded yet");

  }

}

/* ========================= */
/* HERO BUTTON */
/* ========================= */

document.getElementById("heroBtn")
.onclick = () => {

  if(currentMovie){

    openMovie(currentMovie.id);

  }

};

/* ========================= */
/* SEARCH */
/* ========================= */

document.getElementById("searchInput")
.addEventListener("keyup", async (e)=>{

  const value = e.target.value;

  if(value.length < 1){

    loadTrending();

    loadPopular();

    return;

  }

  const res = await fetch(
    `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${value}`
  );

  const data = await res.json();

  renderMovies(data.results, trending);

});

/* ========================= */

loadTrending();

loadPopular();

</script>

</body>
</html>

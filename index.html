<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${brandName}">L2K & PODDA DESIGN</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="snow"></div>

    <header>
        <img src="/images/logo.png" alt="Logo" class="logo">
        <h1 th:text="${brandName}"></h1>
    </header>

    <section class="hero">
        <h2>Creative | Professional | Trusted</h2>
        <p>We design logos, social media posts, and more — 100% reliable and at the best price in Sri Lanka.</p>
        <a href="https://wa.me/94740682507" class="contact-btn">Contact Us</a>
    </section>

    <section class="services">
        <h2>Our Services</h2>
        <div class="cards">
            <div class="card">Logo Design</div>
            <div class="card">Social Media Posts</div>
            <div class="card">Facebook/TikTok Covers</div>
        </div>
    </section>

    <section class="gallery">
        <h2>Our Works</h2>
        <div class="gallery-grid">
            <img src="/images/logo.png" alt="Work 1">
            <img src="/images/logo.png" alt="Work 2">
            <img src="/images/logo.png" alt="Work 3">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 L2K & PODDA DESIGN. All rights reserved.</p>
    </footer>

    <script src="/js/snow.js"></script>
</body>
</html>
